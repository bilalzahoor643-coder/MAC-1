<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MAC-1 Intercepting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f2f5;
      color: #1a1a2e;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h2 { margin: 0 0 8px; font-size: 16px; }
    p { margin: 0; font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>MAC-1 Download Manager</h2>
    <p id="status">Intercepting download...</p>
  </div>
  <script src="intercept.js"></script>
</body>
</html>
