<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAC-1 Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo">
        <img src="icons/icon48.png" alt="MAC-1" class="logo-icon">
        <div class="logo-text">
          <h1>MAC-1</h1>
          <span class="version">v1.0.0</span>
        </div>
      </div>
      <div class="status-toggle">
        <label class="switch">
          <input type="checkbox" id="enabledToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-indicator" id="statusIndicator">
        <span class="dot"></span>
        <span class="text">Connected</span>
      </div>
      <div class="active-downloads">
        <span class="count" id="activeCount">0</span>
        <span class="label">Active</span>
      </div>
    </div>

    <div class="download-section">
      <div class="quick-download">
        <input type="text" id="urlInput" placeholder="Paste download link here..." class="url-input">
        <button id="downloadBtn" class="download-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="links-section">
      <div class="section-header">
        <h3>Download Links Found</h3>
        <button id="refreshLinks" class="icon-btn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <div class="links-list" id="linksList">
        <div class="empty-state">No download links found on this page</div>
      </div>
    </div>

    <div class="debug-section" style="padding: 8px; border-top: 1px solid #333; display: none;" id="debugSection">
      <button id="exportDebugBtn" class="footer-btn" style="width: 100%; margin-bottom: 4px;">
        Export Debug Report
      </button>
      <button id="clearDebugBtn" class="footer-btn" style="width: 100%;">
        Clear Debug Log
      </button>
      <div id="debugStatus" style="font-size: 11px; color: #888; margin-top: 4px;"></div>
    </div>

    <div class="footer">
      <button id="debugToggleBtn" class="footer-btn" title="Toggle Debug Mode">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        Debug
      </button>
      <button id="settingsBtn" class="footer-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </button>
      <button id="openAppBtn" class="footer-btn primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open App
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
